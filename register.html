<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Application | AI Solutions</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-container { 
            position: relative; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            padding: 20px; 
        }
        .login-video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
        }
        .login-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at center, rgba(9, 9, 11, 0.6) 0%, rgba(9, 9, 11, 0.9) 100%); 
            z-index: 2; 
        }
        .login-card { 
            position: relative; 
            z-index: 10; 
            max-width: 480px; 
            width: 100%; 
            padding: 40px; 
            background: var(--glass); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            box-shadow: var(--shadow-lg); 
            text-align: center; 
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.5);
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div class="bankio-loader">
        <img src="assets/Stackly-logo-Blue.webp" alt="Stackly Logo" style="height: 50px; margin-bottom: 40px; filter: hue-rotate(-165deg) saturate(1.5) brightness(1.5) drop-shadow(0 0 10px rgba(229,192,123,0.4)); animation: loaderPulse 2s ease-in-out infinite;">
        <div class="solar-system">
            <div class="sun"></div>
            <div class="orbit orbit-earth">
                <div class="earth">
                    <div class="orbit orbit-moon">
                        <div class="moon"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="bankio-loader-text" style="font-family: 'Orbitron', sans-serif; font-weight: 800; letter-spacing: 2px;">PREPARING FOR LAUNCH</div>
    </div>

    <div class="login-container">
        <img src="assets/register_bg.webp" alt="Register Background" class="login-video">
        <div class="login-overlay"></div>
        <div class="login-card active">
            <a href="index.html" class="logo" style="margin-bottom: 20px; display: inline-block;">
                <img src="assets/Stackly-logo-Blue.webp" alt="Stackly Logo" style="height: 45px; display: block; filter: hue-rotate(-165deg) saturate(1.5) brightness(1.5) drop-shadow(0 0 8px rgba(229,192,123,0.3));">
            </a>
            <h2 style="margin-bottom: 25px;">Enterprise Application</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Role</label>
                    <select id="userRole" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="user">Engineer</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your Email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="display: flex; align-items: center; position: relative;">
                        <input type="password" id="regPassword" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required style="padding-right: 60px;">
                        <span onclick="togglePassword('regPassword', event)" style="position: absolute; right: 15px; cursor: pointer; color: var(--text-muted); font-size: 0.85rem; font-weight: 600;">Show</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div style="display: flex; align-items: center; position: relative;">
                        <input type="password" id="regConfirmPassword" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required style="padding-right: 60px;">
                        <span onclick="togglePassword('regConfirmPassword', event)" style="position: absolute; right: 15px; cursor: pointer; color: var(--text-muted); font-size: 0.85rem; font-weight: 600;">Show</span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; margin-top: 10px;">Submit Application</button>
                <button type="button" class="btn btn-primary" onclick="window.location.href='index.html'" style="width: 100%; padding: 15px; margin-top: 15px;">Go Back</button>
            </form>
            
            <p style="margin-top: 25px; color: var(--text-muted);">Already have clearance? <a href="login.html" style="background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700;">Login Here</a></p>
        </div>
    </div>

    <!-- Registration Logic -->
    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Store email from registration to local storage so they could auto login or prefill
            const email = e.target.querySelector('input[type="email"]').value;
            localStorage.setItem('bankio_email', email);
            
            // Redirect to login page
            window.location.href = 'login.html';
        });
    </script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/script.js"></script>
    <script>
        function togglePassword(inputId, event) {
            const input = document.getElementById(inputId);
            const btn = event.target;
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerText = 'Hide';
            } else {
                input.type = 'password';
                btn.innerText = 'Show';
            }
        }
    </script>
</body>
</html>
